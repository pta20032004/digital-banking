services:
  db:
    image: postgres:16-alpine
    container_name: banking-db
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5434:5432"
    networks:
      - banking-network
    volumes:
      - postgres_data:/var/lib/postgresql/data

networks:
  banking-network:
    external: true # use Internal Network

volumes:
  postgres_data:
